<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obsidian Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

html{
    scroll-behavior:smooth;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:Poppins,sans-serif;
}

/* Navigation */

.nav{
    position:fixed;
    top:25px;
    left:25px;
    display:flex;
    align-items:center;
    gap:15px;
    z-index:1000;
    font-weight:700;
    font-size:18px;
}

.nav a{
    color:white;
    text-decoration:none;
    transition:color .25s ease;
}

.nav a:hover{
    color:#9b6dff;
}

.nav span{
    color:#666;
}

/* Hero */

.container{
    padding:70px;
}

.logo{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:35px;
}

.logo img{
    width:70px;
    image-rendering:pixelated;
}

.logo h1{
    font-size:58px;
    font-weight:800;
    letter-spacing:3px;
}

.ip-box{
    display:inline-flex;
    align-items:center;
    gap:18px;
    background:#1b1b1b;
    padding:18px 28px;
    border-radius:15px;
    border:2px solid #333;
    font-size:20px;
}

.label{
    color:#bbb;
    font-weight:700;
}

.separator{
    color:#555;
}

.ip{
    color:#9b6dff;
    font-weight:700;
}

button{
    background:#7a3cff;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#9358ff;
    transform:scale(1.05);
}

/* Ranks */

#ranks{
    margin-top:300px;
    padding:70px;
}

#ranks h2{
    font-size:48px;
    margin-bottom:20px;
}

.rank-card{
    background:#1b1b1b;
    border:2px solid #333;
    border-radius:15px;
    padding:25px;
    margin-bottom:20px;
    max-width:450px;
}

.rank-card h3{
    color:#9b6dff;
    margin-bottom:10px;
}

.rank-card p{
    color:#bbb;
}

</style>
</head>

<body id="top">

<nav class="nav">
    <a href="#top">Top</a>
    <span>|</span>
    <a href="#ranks">Ranks</a>
</nav>

<div class="container">

<div class="logo">

<img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae" alt="Obsidian">

<h1>Obsidian Store</h1>

<img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae" alt="Obsidian">

</div>

<div class="ip-box">

<span class="label">MINECRAFT</span>

<span class="separator">|</span>

<span class="ip" id="serverIP">play.obsidiansmp.net</span>

<span class="separator">|</span>

<button onclick="copyIP()">Copy IP</button>

</div>

</div>

<section id="ranks">

<h2>Ranks</h2>

<div class="rank-card">
<h3>Example Rank</h3>
<p>Replace this with your first rank description.</p>
</div>

<div class="rank-card">
<h3>Example Rank</h3>
<p>Replace this with your second rank description.</p>
</div>

<div class="rank-card">
<h3>Example Rank</h3>
<p>Replace this with your third rank description.</p>
</div>

</section>

<script>

function copyIP(){

const ip=document.getElementById("serverIP").innerText;

navigator.clipboard.writeText(ip);

const btn=document.querySelector("button");

btn.innerText="Copied!";

setTimeout(()=>{
btn.innerText="Copy IP";
},2000);

}

</script>

</body>
</html>

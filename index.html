<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obsidian Store</title>

<style>

html{
    scroll-behavior:smooth;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:Poppins,sans-serif;
    margin:0;
    padding:20px;
}

.container{
    text-align:left;
}

.backTop{
    position:fixed;
    top:20px;
    right:30px;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    transition:.25s;
    z-index:100;
}

.backTop:hover{
    color:#8f5cff;
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    text-align:center;
    padding-top:40px;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:25px;
}

.logo img{
    width:40px;
    image-rendering:pixelated;
}

.logo h1{
    font-size:32px;
    font-weight:800;
    letter-spacing:2px;
}

.ipBox{
    display:flex;
    align-items:center;
    gap:15px;
    background:#171717;
    border:2px solid #2f2f2f;
    border-radius:16px;
    padding:20px 35px;
}

.ip{
    color:#8f5cff;
    font-weight:bold;
}

.copyBtn{
    padding:12px 25px;
    background:#3b82f6;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}

.copyBtn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #3b82f6;
}

.menu{
    margin-top:70px;
    font-size:60px;
    color:#d2b6ff;
    cursor:pointer;
    transition:.25s;
}

.menu:hover{
    color:#8f5cff;
    text-shadow:0 0 15px #8f5cff;
}

.store{
    min-height:100vh;
    padding:120px 20px;
    text-align:center;
}

.store h2{
    font-size:60px;
    margin-bottom:60px;
    font-weight:900;
}

.rank{
    width:340px;
    margin:25px auto;
    padding:30px;
    background:#141414;
    border:2px solid #8f5cff;
    border-radius:18px;
    transition:.3s;
}

.rank:hover{
    transform:translateY(-8px);
    box-shadow:0 0 25px #8f5cff;
}

.rank h3{
    font-size:40px;
    color:#a970ff;
    margin-bottom:15px;
}

.rank p{
    color:#ddd;
    margin-bottom:25px;
}

.buy{
    display:inline-block;
    text-decoration:none;
    background:#3b82f6;
    color:white;
    padding:14px 45px;
    border-radius:12px;
    font-weight:bold;
    transition:.25s;
}

.buy:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px #3b82f6;
}

@media(max-width:700px){

.logo h1{
    font-size:48px;
}

.ipBox{
    flex-direction:column;
    gap:12px;
}

.rank{
    width:90%;
}

}

</style>

</head>

<body id="top">

<a href="#top" class="backTop">Back to Top ↑</a>

<section class="hero">

<div class="logo">
<h1>Obsidian Store</h1>
</div>

<div class="ipBox">

<span>MINECRAFT</span>

<span>|</span>

<span class="ip" id="serverIP">YOUR_SERVER_IP</span>

<span>|</span>

<button class="copyBtn" onclick="copyIP()">Copy</button>

</div>

<div class="menu"
onclick="document.getElementById('store').scrollIntoView({behavior:'smooth'})">

☰

</div>

</section>

<section class="store" id="store">

<h2>STORE</h2>

<div class="rank">
<h3>VIP</h3>
<p>Exclusive perks and cosmetics.</p>
<a class="buy" href="https://discord.gg/wNpcbbbS" target="_blank">CLICK</a>
</div>

<div class="rank">
<h3>MVP</h3>
<p>More rewards and better perks.</p>
<a class="buy" href="https://discord.gg/wNpcbbbS" target="_blank">CLICK</a>
</div>
<div class="rank">
<h3>LEGEND</h3>
<p>The ultimate supporter rank.</p>
<a class="buy" href="https://discord.gg/wNpcbbbS" target="_blank">CLICK</a>
</div>

</section>

<script>

function copyIP(){

    const ip=document.getElementById("serverIP").innerText;

    navigator.clipboard.writeText(ip);

    const btn=document.querySelector(".copyBtn");

    btn.innerText="Copied!";

    setTimeout(function(){

        btn.innerText="Copy";

    },2000);

}

</script>

</body>
</html>

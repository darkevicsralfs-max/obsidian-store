<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* Smooth Scrolling Enable */
        html {
            scroll-behavior: smooth;
        }

        /* Base Reset & Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding-bottom: 100px;
        }

        /* Top Navigation Bar */
        .navbar {
            background-color: #000000;
            padding: 18px 40px;
            text-align: left;
            border-bottom: 2px solid #141414;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            margin-right: 15px;
            transition: color 0.3s ease; 
        }
        .navbar a:hover {
            color: #a855f7;
        }
        .navbar span {
            color: #333333;
            margin-right: 15px;
            font-weight: 800;
        }

        /* Container for content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Area */
        .header-title {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 60px 0 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            letter-spacing: 0.5px;
        }
        
        /* Logo Images styling */
        .header-title img {
            width: 42px;
            height: 42px;
            image-rendering: pixelated; /* Keeps the Minecraft texture sharp */
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.4));
        }

        /* Server IP Widget Box */
        .ip-bar {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            gap: 15px;
            font-size: 0.85rem;
            margin-bottom: 80px;
            letter-spacing: 0.5px;
        }
        .ip-bar .mc-label {
            color: #ffffff;
            font-weight: 800;
        }
        .ip-bar .divider {
            color: #333333;
        }
        .ip-bar .ip-address {
            color: #a855f7; 
            font-weight: 600;
        }
        .ip-bar .copy-btn {
            background-color: #581c87; 
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.8rem;
            transition: background-color 0.2s;
        }
        .ip-bar .copy-btn:hover {
            background-color: #6b21a8;
        }

        /* Section Title */
        .section-title {
            font-size: 2.6rem;
            font-weight: 900;
            margin-bottom: 50px;
            scroll-margin-top: 100px;
        }

        /* Ranks Grid Layout */
        .ranks-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 35px;
        }

        /* Card Container (Rank Box + Buy Button) */
        .card-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
        }

        /* Individual Rank Box */
        .rank-card {
            background-color: #151515;
            border: 1px solid #222222;
            border-radius: 12px;
            width: 100%;
            padding: 30px 25px;
            text-align: left;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .rank-card h3 {
            color: #a855f7; 
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-weight: 800;
        }
        .rank-card p {
            color: #aaaaaa;
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Buy Button styling */
        .buy-btn {
            background-color: #09021a; 
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 6px 40px;
            font-size: 1.6rem;
            font-weight: 900;
            font-family: 'Poppins', sans-serif;
            text-transform: lowercase;
            margin-top: 20px;
            cursor: pointer;
            width: fit-content;
            transition: transform 0.2s, background-color 0.2s;
        }
        .buy-btn:hover {
            transform: scale(1.05);
            background-color: #120433;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#">Top</a>
        <span>|</span>
        <a href="#ranks-section">Ranks</a>
    </nav>

    <div class="container">
        
        <h1 class="header-title">
            <img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae" alt="Obsidian Block Left">
            Obsidian Store
            <img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae" alt="Obsidian Block Right">
        </h1>

        <div class="ip-bar">
            <span class="mc-label">MINECRAFT</span>
            <span class="divider">|</span>
            <span class="ip-address">play.obsidiansmp.net</span>
            <span class="divider">|</span>
            <button class="copy-btn" onclick="copyIpAddress()">Copy IP</button>
        </div>

        <h2 id="ranks-section" class="section-title">Ranks</h2>

        <div class="ranks-grid">
            
            <div class="card-container">
                <div class="rank-card">
                    <h3>Example Rank</h3>
                    <p>Replace this with your first rank description.</p>
                </div>
                <button class="buy-btn">buy</button>
            </div>

            <div class="card-container">
                <div class="rank-card">
                    <h3>Example Rank</h3>
                    <p>Replace this with your first rank description.</p>
                </div>
                <button class="buy-btn">buy</button>
            </div>

            <div class="card-container">
                <div class="rank-card">
                    <h3>Example Rank</h3>
                    <p>Replace this with your first rank description.</p>
                </div>
                <button class="buy-btn">buy</button>
            </div>

        </div>

    </div>

    <script>
        function copyIpAddress() {
            navigator.clipboard.writeText('play.obsidiansmp.net');
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => {
                btn.textContent = 'Copy IP';
            }, 2000);
        }
    </script>

</body>
</html>

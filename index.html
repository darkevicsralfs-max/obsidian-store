<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obsidian Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
<style>

html{
    scroll-behavior:smooth;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.backTop{
    position:fixed;
    top:20px;
    right:30px;
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.25s;
    z-index:100;
}

.backTop:hover{
    color:#8f5cff;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:30px;
}

.logo img{
    width:90px;
    image-rendering:pixelated;
}

.logo h1{
    font-size:70px;
    letter-spacing:5px;
}

.ipBox{

    margin-top:40px;

    display:flex;

    align-items:center;

    gap:15px;

    background:#171717;

    padding:20px 35px;

    border-radius:15px;

    border:2px solid #2f2f2f;

}

.ip{
    color:#8f5cff;
    font-weight:bold;
}

.copyBtn{

    padding:12px 25px;

    background:#3b82f6;

    color:white;

    border:none;

    border-radius:10px;

    cursor:pointer;

    font-weight:bold;

    transition:.25s;

}

.copyBtn:hover{

    box-shadow:0 0 20px #3b82f6;

    transform:scale(1.05);

}

.menu{

    margin-top:60px;

    font-size:45px;

    cursor:pointer;

    transition:.25s;

}

.menu:hover{

    color:#8f5cff;

}

.store{

    min-height:100vh;

    padding-top:120px;

    text-align:center;

}

.store h2{

    font-size:55px;

    margin-bottom:60px;

}

.rank{

    width:340px;

    margin:25px auto;

    background:#171717;

    border:2px solid #8f5cff;

    border-radius:18px;

    padding:30px;

    transition:.3s;

}

.rank:hover{

    transform:translateY(-8px);

    box-shadow:0 0 30px #8f5cff;

}

.rank h3{

    font-size:35px;

    margin-bottom:15px;

}

.buy{

    margin-top:20px;

    display:inline-block;

    background:#3b82f6;

    padding:14px 35px;

    color:white;

    text-decoration:none;

    border-radius:12px;

    font-weight:bold;

    transition:.25s;

}

.buy:hover{

    transform:scale(1.08);

    box-shadow:0 0 20px #3b82f6;

}

</style>

</head>

<body id="top">

<a href="#top" class="backTop">Back to Top ↑</a>

<section class="hero">

<div class="logo">

<img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae">

<h1>OBSIDIAN STORE</h1>

<img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae">

</div>

<div class="ipBox">

<span>MINECRAFT</span>

<span>|</span>

<span class="ip" id="serverIP">YOUR_SERVER_IP</span>

<span>|</span>

<button class="copyBtn" onclick="copyIP()">Copy</button>

</div>

<div class="menu"
onclick="document.getElementById('store').scrollIntoView({behavior:'smooth'})">

☰

</div>

</section>

<section class="store" id="store">

<h2>STORE</h2>

<div class="rank">

<h3>VIP</h3>

<p>Exclusive perks and cosmetics.</p>

<a class="buy"
href="https://discord.gg/wNpcbbbS"
target="_blank">
CLICK
</a>

</div>

<div class="rank">

<h3>MVP</h3>

<p>More rewards and better perks.</p>

<a class="buy"
href="https://discord.gg/wNpcbbbS"
target="_blank">
CLICK
</a>

</div>

<div class="rank">

<h3>LEGEND</h3>

<p>The ultimate supporter rank.</p>

<a class="buy"
href="https://discord.gg/wNpcbbbS"
target="_blank">
CLICK
</a>

</div>

</section>

<script>

function copyIP(){

const ip=document.getElementById("serverIP").innerText;

navigator.clipboard.writeText(ip);

const btn=document.querySelector(".copyBtn");

btn.innerText="Copied!";

setTimeout(function(){

btn.innerText="Copy";

},2000);

}

</script>

</body>
</html>

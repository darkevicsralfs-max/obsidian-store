<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* Smooth Scrolling Enable */
        html {
            scroll-behavior: smooth;
        }

        /* Base Reset & Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0b0b; /* Fallback background color */
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding-bottom: 100px;
            position: relative;
            overflow-x: hidden;
            
            /* --- PREVENT TEXT SELECTION ON DOUBLE CLICK --- */
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE10+/Edge */
            user-select: none;         /* Standard syntax */
        }

        /* Top Loading Progress Bar styling */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #a855f7;
            z-index: 99999;
            width: 0%;
            box-shadow: 0 0 8px #a855f7, 0 0 15px rgba(168, 85, 247, 0.8);
            transition: opacity 0.4s ease, width 0.4s ease;
            pointer-events: none;
            animation: load-progress 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes load-progress {
            0% { width: 0%; opacity: 1; }
            20% { width: 30%; }
            50% { width: 70%; }
            80% { width: 90%; }
            100% { width: 95%; }
        }

        /* --- VIDEO BACKGROUND CONTAINER --- */
        .video-background {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.78vh;
            transform: translate(-50%, -50%);
            z-index: -2;
            pointer-events: none; 
        }
        .video-background iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        /* Dark Tint Overlay over the video wallpaper */
        .wallpaper-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 11, 11, 0.82);
            z-index: -1;
            pointer-events: none;
        }

        /* --- CUSTOM MOUSE TRACKING EFFECTS --- */
        .cursor-dot {
            width: 10px;
            height: 10px;
            background-color: #a855f7;
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 12px #a855f7, 0 0 20px rgba(168, 85, 247, 0.6);
            transition: transform 0.05s ease-out, opacity 0.2s ease;
            opacity: 1;
        }

        .click-ripple {
            position: fixed;
            border: 3px solid #a855f7;
            border-radius: 50%;
            background: transparent;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            animation: ripple-out 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        @keyframes ripple-out {
            0% { width: 0px; height: 0px; opacity: 1; }
            100% { width: 60px; height: 60px; opacity: 0; }
        }

        /* --- PAGE LAYOUT & STYLING --- */
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 18px 40px;
            text-align: left;
            border-bottom: 2px solid #141414;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            margin-right: 15px;
            transition: color 0.3s ease; 
        }
        .navbar a:hover {
            color: #a855f7;
        }
        .navbar span {
            color: #333333;
            margin-right: 15px;
            font-weight: 800;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header-title {
            font-size: 3.8rem;
            font-weight: 900;
            margin: 60px 0 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            letter-spacing: 0.5px;
        }
        .header-title img {
            width: 80px;
            height: 80px;
            image-rendering: pixelated; 
            filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.4));
        }

        /* --- WIDGET STACKED CONTAINER --- */
        .widgets-container {
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 15px;             
            margin-bottom: 60px;
            width: 100%;
        }

        /* Server IP & Discord Widget Boxes */
        .ip-bar {
            background-color: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(6px);
            border: 1px solid #222222;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            gap: 15px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            width: 100%;
            max-width: 460px; 
            justify-content: center;
        }
        
        .widget-logo {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        .ip-bar .label-text {
            color: #ffffff;
            font-weight: 800;
        }
        .ip-bar .divider {
            color: #333333;
        }
        .ip-bar .value-text {
            color: #a855f7; 
            font-weight: 600;
        }
        .ip-bar .copy-btn {
            background-color: #581c87; 
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.8rem;
            transition: background-color 0.2s;
        }
        .ip-bar .copy-btn:hover {
            background-color: #6b21a8;
        }

        .about-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .about-box {
            background-color: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(10px);

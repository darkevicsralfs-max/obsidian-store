<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obsidian Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

html{
    scroll-behavior:smooth;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111111;
    color:white;
    font-family:Poppins,sans-serif;
}

/* ===========================
   Navigation
=========================== */

.navbar{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    display:flex;
    justify-content:flex-start;
    align-items:center;

    padding:22px 34px;

    background:#111111;

    z-index:1000;

}

.nav-links{

    display:flex;
    align-items:center;
    gap:14px;

}

.nav-links a{

    color:white;
    text-decoration:none;

    font-size:18px;
    font-weight:700;

    transition:.25s;

}

.nav-links a:hover{

    color:#8f63ff;

}

.nav-links span{

    color:#666;

}

/* ===========================
   Divider
=========================== */

.divider{

    margin-top:72px;

    width:100%;
    height:4px;

    background:#2e2e2e;

}

/* ===========================
   Hero
=========================== */

.hero{

    text-align:center;

    padding-top:28px;

}

.logo{

    display:flex;
    justify-content:center;
    align-items:center;

    gap:22px;

}

.logo img{

    width:58px;

    image-rendering:pixelated;

}

.logo h1{

    font-size:56px;

    font-weight:800;

}

/* ===========================
   IP Box
=========================== */

.ip-box{

    margin-top:30px;

    display:inline-flex;
    align-items:center;

    gap:18px;

    background:#1b1b1b;

    border:2px solid #353535;

    border-radius:15px;

    padding:16px 24px;

}

.label{

    color:#d6d6d6;
    font-weight:700;

}

.separator{

    color:#555;

}

.ip{

    color:#8f63ff;

    font-weight:700;

}

button{

    background:#6f39ff;

    color:white;

    border:none;

    padding:11px 22px;

    border-radius:9px;

    font-size:15px;

    cursor:pointer;

    transition:.25s;

}

button:hover{

    background:#8859ff;

    transform:translateY(-2px);

}

/* ===========================
   Placeholder
=========================== */

.placeholder{

    height:900px;

}

</style>

</head>

<body id="top">

<nav class="navbar">

    <div class="nav-links">

        <a href="#top">Top</a>

        <span>|</span>

        <a href="#ranks">Ranks</a>

    </div>

</nav>

<div class="divider"></div>

<header class="hero">

<div class="logo">

<img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae" alt="Obsidian">

<h1>Obsidian Store</h1>

<img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae" alt="Obsidian">

</div>

<div class="ip-box">

<span class="label">MINECRAFT</span>

<span class="separator">|</span>

<span class="ip" id="serverIP">play.obsidiansmp.net</span>

<span class="separator">|</span>

<button onclick="copyIP()">Copy IP</button>

</div>

</header>

<div class="placeholder" id="ranks"></div>

<script>

function copyIP(){

const ip=document.getElementById("serverIP").innerText;

navigator.clipboard.writeText(ip);

const btn=document.querySelector("button");

btn.innerText="Copied!";

setTimeout(()=>{

btn.innerText="Copy IP";

},2000);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obsidian Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Poppins,sans-serif;
    margin:0;
    padding:20px;
}

.container{
    text-align:left;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:25px;
}

.logo img{
    width:40px;
}

.logo h1{
    font-size:32px;
    font-weight:800;
    letter-spacing:2px;
}

.ip-box{
    display:inline-flex;
    align-items:center;
    gap:18px;
    background:#1b1b1b;
    padding:14px 20px;
    border-radius:12px;
    border:2px solid #333;
    font-size:16px;
}

.label{color:#bbb;font-weight:700;}
.separator{color:#555;}
.ip{color:#9b6dff;font-weight:700;}

button{
    background:#7a3cff;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#9358ff;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae">
<h1>ᴏʙsɪᴅɪᴀɴ sᴛᴏʀᴇ</h1>
<img src="https://minecraft.wiki/images/Obsidian_JE3_BE2.png?0a8ae">
</div>

<div class="ip-box">
<span class="label">MINECRAFT</span>
<span class="separator">|</span>
<span class="ip" id="serverIP">play.obsidiansmp.net</span>
<span class="separator">|</span>
<button onclick="copyIP()">Copy IP</button>
</div>

</div>

<script>
function copyIP(){
const ip=document.getElementById("serverIP").innerText;
navigator.clipboard.writeText(ip);
const btn=document.querySelector("button");
btn.innerText="Copied!";
setTimeout(()=>btn.innerText="Copy IP",2000);
}
</script>

</body>
</html>
